# Render Blueprint — deploy in one click: render.com → New → Blueprint → pick this repo.
# No server-side audio storage (the converted clip is streamed back to the browser), so the same
# app also deploys to serverless hosts like Vercel — just set the same env vars there.
# NOTE: Render's free plan spins down on idle (~50s cold start); use a paid plan or Vercel to keep
# the demo always-warm.
services:
  - type: web
    name: voiceprint-scr
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      - key: ELEVENLABS_API_KEY # paste your key (kept secret)
        sync: false
      - key: ACCESS_CODE # the shared code friends type to unlock unlimited transforms
        sync: false
      - key: TRIAL_COOKIE_SECRET # random value, generated by Render
        generateValue: true
